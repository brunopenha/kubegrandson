name: kubegrandson
description: "A Flutter-based Kubernetes log viewer application - son of Kubeson."
publish_to: 'none'

version: 0.0.8+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

  # State Management
  provider: ^6.1.5+1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Kubernetes Client
  kubernetes: ^1.26.0+5
  kubeconfig: ^1.0.3
  k8s: ^1.27.0+dev.2

  # HTTP & WebSocket
  http: ^1.6.0
  web_socket_channel: ^3.0.3

  # YAML & JSON Processing
  yaml: ^3.1.3
  json_annotation: ^4.12.0

  # Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.0

  # Logging
  logger: ^2.7.0

  # UI Components
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0
  flutter_markdown: ^0.7.7+1
  scrollable_positioned_list: ^0.3.8

  # Desktop Support
  window_manager: ^0.5.1
  file_picker: ^10.3.7

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.8
  freezed_annotation: ^3.1.0
  path_provider: ^2.1.5
  collection: ^1.19.1
  go_router: ^17.2.3

  # JSON Viewer
  flutter_json_view: ^1.1.5

  # Search & Highlighting
  flutter_highlight: ^0.7.0

  # Async utilities
  async: ^2.13.1
  rxdart: ^0.28.0

  path: any
  dio: any
  url_launcher: ^6.3.2
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  freezed: ^3.2.5
  mocktail: ^1.0.5
  integration_test:
    sdk: flutter

  dio: any
flutter:
  uses-material-design: true

  assets:
    - pubspec.yaml
    - assets/icons/
    - assets/json_viewer/

  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/Kubegrandson.ico"
  adaptive_icon_background: "#ff0000"
  adaptive_icon_foreground: "assets/icons/Kubegrandson_64.png"